<div class="app">
    <h1>Budget Tracker</h1>

    <div class="summary">
      <div class="card income">
        <h3>Total Income</h3>
        <div class="value" id="total-income">$0.00</div>
      </div>
      <div class="card expense">
        <h3>Total Expenses</h3>
        <div class="value" id="total-expenses">$0.00</div>
      </div>
      <div class="card balance">
        <h3>Balance</h3>
        <div class="value" id="balance">$0.00</div>
      </div>
    </div>

    <form id="transaction-form">
      <div>
        <label for="description">Description</label>
        <input id="description" type="text" placeholder="e.g. Groceries, Salary" required />
      </div>
      <div>
        <label for="amount">Amount</label>
        <input id="amount" type="number" step="0.01" placeholder="0.00" required />
      </div>
      <div>
        <label for="type">Type</label>
        <select id="type">
          <option value="income">Income</option>
          <option value="expense">Expense</option>
        </select>
      </div>
      <div>
        <button type="submit">Add</button>
      </div>
    </form>

    <div class="transactions">
      <div class="transactions-header">
        <span>Description</span>
        <span>Type</span>
        <span>Amount</span>
        <span></span>
      </div>
      <ul class="transactions-list" id="transactions-list"></ul>
    </div>

    <div class="footer">
      Data is stored in your browser (localStorage).
    </div>
  </div>
  <!--<script src="index.js"></script>-->
  <!--<link rel="index.css"></link>-->
  <script>
    const form = document.getElementById('transaction-form');
    const descriptionInput = document.getElementById('description');
    const amountInput = document.getElementById('amount');
    const typeSelect = document.getElementById('type');
    const listEl = document.getElementById('transactions-list');

    const totalIncomeEl = document.getElementById('total-income');
    const totalExpensesEl = document.getElementById('total-expenses');
    const balanceEl = document.getElementById('balance');

    const STORAGE_KEY = 'simple_budget_transactions_v1';

    let transactions = [];

    function loadTransactions() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        try {
          transactions = JSON.parse(saved);
        } catch {
          transactions = [];
        }
      }
      render();
    }

    function saveTransactions() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(transactions));
    }

    function formatCurrency(value) {
      return '$' + Number(value).toFixed(2);
    }

    function addTransaction(description, amount, type) {
      const tx = {
        id: Date.now(),
        description,
        amount: Number(amount),
        type
      };
      transactions.push(tx);
      saveTransactions();
      render();
    }

    function deleteTransaction(id) {
      transactions = transactions.filter(t => t.id !== id);
      saveTransactions();
      render();
    }

    function render() {
      listEl.innerHTML = '';

      let income = 0;
      let expenses = 0;

      transactions.forEach(tx => {
        if (tx.type === 'income') {
          income += tx.amount;
        } else {
          expenses += tx.amount;
        }

        const li = document.createElement('li');

        const descSpan = document.createElement('span');
        descSpan.textContent = tx.description;

        const typeSpan = document.createElement('span');
        typeSpan.className = 'type-pill ' + tx.type;
        typeSpan.textContent = tx.type === 'income' ? 'Income' : 'Expense';

        const amountSpan = document.createElement('span');
        amountSpan.className = 'amount ' + tx.type;
        amountSpan.textContent = formatCurrency(tx.amount);

        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'delete-btn';
        deleteBtn.textContent = '✕';
        deleteBtn.title = 'Delete';
        deleteBtn.addEventListener('click', () => deleteTransaction(tx.id));

        li.appendChild(descSpan);
        li.appendChild(typeSpan);
        li.appendChild(amountSpan);
        li.appendChild(deleteBtn);

        listEl.appendChild(li);
      });

      const balance = income - expenses;

      totalIncomeEl.textContent = formatCurrency(income);
      totalExpensesEl.textContent = formatCurrency(expenses);
      balanceEl.textContent = formatCurrency(balance);
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const description = descriptionInput.value.trim();
      const amount = amountInput.value;

      if (!description || !amount || Number(amount) <= 0) {
        return;
      }

      addTransaction(description, amount, typeSelect.value);

      descriptionInput.value = '';
      amountInput.value = '';
      descriptionInput.focus();
    });

    loadTransactions();
  </script>
  <style>

      background: #f4f6fb;
      margin: 0;

    }

      margin-top: 0;
      font-size: 1.6rem;
      text-align: center;
    }

    .summary {

      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .card {
      flex: 1 1 150px;
      background: #f8fafc;
      border-radius: 8px;
      padding: 10px 12px;
      border: 1px solid #e2e8f0;
    }

    .card h3 {
      margin: 0 0 4px;
      font-size: 0.9rem;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .card .value {
      font-size: 1.2rem;
      font-weight: 600;
    }

    .card.income .value {
      color: #16a34a;
    }

    .card.expense .value {
      color: #dc2626;
    }

    .card.balance .value {
      color: #0f172a;
    }

    form {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr auto;
      gap: 8px;
      margin-bottom: 18px;
      align-items: end;
    }

    label {
      font-size: 0.8rem;
      color: #64748b;
      display: block;
      margin-bottom: 2px;
    }

    input, select, button {
      font: inherit;
    }

    input[type="text"],
    input[type="number"],
    select {
      width: 100%;
      padding: 6px 8px;
      border-radius: 6px;
      border: 1px solid #cbd5e1;
      box-sizing: border-box;
    }

    input:focus,
    select:focus {
      outline: 2px solid #3b82f6;
      outline-offset: 1px;
      border-color: #3b82f6;
    }

    button {
      padding: 8px 14px;
      border-radius: 6px;

      background: #3b82f6;
      color: #ffffff;
      font-weight: 600;
      white-space: nowrap;
    }

    button:hover {
      background: #2563eb;
    }

    .transactions {
      margin-top: 10px;
    }

    .transactions-header {
      display: flex;
      justify-content: space-between;

    }

      list-style: none;

      overflow-y: auto;

    .transactions-list li {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr auto;
      gap: 8px;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid #f1f5f9;
      font-size: 0.9rem;
    }

    .amount.income {
      color: #16a34a;
    }

    .amount.expense {
      color: #dc2626;
    }

    .type-pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .type-pill.income {
      background: #dcfce7;
      color: #166534;
    }

    .type-pill.expense {
      background: #fee2e2;
      color: #b91c1c;
    }

    .delete-btn {
      border: none;
      background: transparent;
      color: #94a3b8;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .delete-btn:hover {
      color: #ef4444;
    }

    .footer {
      margin-top: 14px;
      font-size: 0.75rem;
      color: #94a3b8;
      text-align: right;
    }

    @media (max-width: 640px) {
      form {
        grid-template-columns: 1fr;
      }

      .transactions-list li {
        grid-template-columns: 1.5fr 1fr 1fr auto;
      }
    }
  </style>
