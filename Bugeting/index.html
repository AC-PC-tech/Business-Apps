<div class="app">
    <h1>Budget Tracker</h1>

    <div class="summary">
      <div class="card income">
        <h3>Total Income</h3>
        <div class="value" id="total-income">$0.00</div>
      </div>
      <div class="card expense">
        <h3>Total Expenses</h3>
        <div class="value" id="total-expenses">$0.00</div>
      </div>
      <div class="card balance">
        <h3>Balance</h3>
        <div class="value" id="balance">$0.00</div>
      </div>
    </div>

    <form id="transaction-form">
      <div>
        <label for="description">Description</label>
        <input id="description" type="text" placeholder="e.g. Groceries, Salary" required />
      </div>
      <div>
        <label for="amount">Amount</label>
        <input id="amount" type="number" step="0.01" placeholder="0.00" required />
      </div>
      <div>
        <label for="type">Type</label>
        <select id="type">
          <option value="income">Income</option>
          <option value="expense">Expense</option>
        </select>
      </div>
      <div>
        <button type="submit">Add</button>
      </div>
    </form>

    <div class="transactions">
      <div class="transactions-header">
        <span>Description</span>
        <span>Type</span>
        <span>Amount</span>
        <span></span>
      </div>
      <ul class="transactions-list" id="transactions-list"></ul>
    </div>

    <div class="footer">
      Data is stored in your browser (localStorage).
    </div>
  </div>
  <script type="text/javascript" src="index.js"></script>
  <link type="text/css" rel="stylesheet" href="index.css">
